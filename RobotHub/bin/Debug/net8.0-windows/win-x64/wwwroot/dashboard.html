<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Orange Hub Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg-dark: #07090f;
      --surface-color: rgba(255, 255, 255, 0.025);
      --surface-border: rgba(255, 255, 255, 0.07);
      --surface-blur: blur(24px);
      
      --accent-1: #ff6b1a; /* Vibrant orange */
      --accent-2: #ff2a5f; /* Hot pink/magenta blend */
      --accent-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      
      --green-glow: rgba(16, 185, 129, 0.5);
      --green: #10b981;
      --red-glow: rgba(239, 68, 68, 0.5);
      --red: #ef4444;
      --yellow: #eab308;
      
      --text-main: #f8fafc;
      --text-muted: #8b9bb4;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 40%, rgba(255, 107, 26, 0.08), transparent 40%),
        radial-gradient(circle at 90% 60%, rgba(255, 42, 95, 0.08), transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px 30px;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 0 10px;
    }

    header .logo {
      width: 44px;
      height: 44px;
      background: var(--accent-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 32px rgba(255, 107, 26, 0.35);
      position: relative;
    }
    
    header .logo::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: var(--accent-gradient);
      z-index: -1;
      filter: blur(8px);
      opacity: 0.6;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: #fff;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Pills and Toggles ── */
    .connection-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--surface-color);
      border: 1px solid var(--surface-border);
      backdrop-filter: var(--surface-blur);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .connection-pill .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 14px var(--red-glow);
      transition: all 0.5s ease;
    }

    .connection-pill.live .dot {
      background: var(--green);
      box-shadow: 0 0 14px var(--green-glow);
    }

    /* ── Toggle Switch ── */
    .toggle-wrapper {
      margin-left: 30px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-right: auto;
      background: var(--surface-color);
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--surface-border);
      backdrop-filter: var(--surface-blur);
    }

    .toggle-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
      appearance: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--surface-border);
      border-radius: 14px;
      outline: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .toggle-switch:checked {
      background: rgba(255, 107, 26, 0.25);
      border-color: var(--accent-1);
    }

    .toggle-switch:checked::after {
      transform: translateX(24px);
      background: var(--accent-1);
      box-shadow: 0 0 10px rgba(255, 107, 26, 0.6);
    }

    .toggle-switch:checked ~ .toggle-label {
      color: var(--accent-1);
      text-shadow: 0 0 12px rgba(255, 107, 26, 0.3);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      backdrop-filter: var(--surface-blur);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .card:hover {
      border-color: rgba(255,255,255,0.15);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .status-row .indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 14px var(--red-glow);
      transition: all 0.4s ease;
      flex-shrink: 0;
    }

    .status-row .indicator.on {
      background: var(--green);
      box-shadow: 0 0 16px var(--green-glow);
    }

    .status-row .label {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .status-row .badge {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* ── Joint bars ── */
    .joint-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .joint-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .joint-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .joint-bar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }

    .joint-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: var(--accent-gradient);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 50%;
      box-shadow: 0 0 10px rgba(255, 107, 26, 0.6);
    }

    .joint-value {
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
      font-weight: 600;
    }

    /* ── Metrics ── */
    .metric-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 2.2rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      text-shadow: 0 4px 16px rgba(255, 107, 26, 0.15);
    }

    .metric-unit {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Log ── */
    .log-card {
      grid-column: 1 / -1;
      padding: 0;
    }

    .log-box {
      background: transparent;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      height: 220px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .log-box::-webkit-scrollbar { width: 8px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
    }
    .log-box::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    .log-box .entry { margin-bottom: 6px; }
    .log-box .entry.info { color: #38bdf8; }
    .log-box .entry.warn { color: var(--yellow); }
    .log-box .entry.err { color: var(--red); }
    .log-box .entry.ok { color: var(--green); text-shadow: 0 0 8px rgba(16, 185, 129, 0.3); }

    /* ── Action Buttons ── */
    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--surface-border);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    .btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      margin-bottom: 16px;
    }
    
    .card-title-row .card-title { margin: 0; }

    /* ── Footer ── */
    footer {
      margin-top: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.02em;
    }
    
    /* Micro-animations */
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">RH</div>
    <h1>Robot Hub</h1>
    
    <div class="toggle-wrapper" title="Unlock physical motors for manual pose teaching">
      <input type="checkbox" id="learning-toggle" class="toggle-switch" checked>
      <span class="toggle-label" id="learning-label">Motors Unlocked (Learning)</span>
    </div>

    <div class="connection-pill" id="pill">
      <div class="dot"></div>
      <span id="pill-label">Connecting ...</span>
    </div>
  </header>

  <div class="grid">

    <!-- Robot R1 -->
    <div class="card">
      <div class="card-title">Robot R1</div>
      <div class="status-row">
        <div class="indicator" id="r1-dot"></div>
        <span class="label">ROS Bridge</span>
        <span class="badge" id="r1-status">--</span>
      </div>
      <div style="margin-top:4px; font-size:0.75rem; color:var(--text-muted); margin-bottom:10px;">
        RPi temp: <span id="r1-temp" style="color:var(--text-main);">-- C</span>
      </div>
      <div class="card-title-row">
        <div class="card-title">Joint State (rad)</div>
        <button class="btn" onclick="calibrateRobot('Robot_Niryo_01', this)">Calibrate</button>
      </div>
      <div class="joint-grid" id="r1-joints">
        <!-- generated by JS -->
      </div>
    </div>

    <!-- Robot R2 -->
    <div class="card">
      <div class="card-title">Robot R2</div>
      <div class="status-row">
        <div class="indicator" id="r2-dot"></div>
        <span class="label">ROS Bridge</span>
        <span class="badge" id="r2-status">--</span>
      </div>
      <div style="margin-top:4px; font-size:0.75rem; color:var(--text-muted); margin-bottom:10px;">
        RPi temp: <span id="r2-temp" style="color:var(--text-main);">-- C</span>
      </div>
      <div class="card-title-row">
        <div class="card-title">Joint State (rad)</div>
        <button class="btn" onclick="calibrateRobot('Robot_Niryo_02', this)">Calibrate</button>
      </div>
      <div class="joint-grid" id="r2-joints">
      </div>
    </div>

    <!-- Unity Expert -->
    <div class="card">
      <div class="card-title">Expert Unity Client</div>
      <div class="status-row">
        <div class="indicator" id="unity-dot"></div>
        <span class="label">Connection</span>
        <span class="badge" id="unity-status">OFFLINE</span>
      </div>
      <div class="card-title" style="margin-top:10px;">Round-trip Latency</div>
      <div class="metric-row">
        <span class="metric-value" id="latency-val">--</span>
        <span class="metric-unit">ms</span>
      </div>
      <div class="card-title" style="margin-top:10px;">Relay FPS</div>
      <div class="metric-row">
        <span class="metric-value" id="fps-val">--</span>
        <span class="metric-unit">Hz</span>
      </div>
    </div>

    <!-- Event Log -->
    <div class="card log-card">
      <div class="log-box" id="log-box"></div>
    </div>

  </div>

  <footer>Robot Orange Hub &mdash; Worker Service edition &bull; <span id="ts">--</span></footer>

  <script>
    // ── Joint grid initializer ──
    function buildJointGrid(containerId) {
      const el = document.getElementById(containerId);
      for (let i = 0; i < 6; i++) {
        el.innerHTML += `
        <div class="joint-item">
          <span class="joint-label">J${i + 1}</span>
          <div class="joint-bar-track"><div class="joint-bar-fill" id="${containerId}-bar-${i}" style="width:50%"></div></div>
          <span class="joint-value" id="${containerId}-val-${i}">0.00</span>
        </div>`;
      }
    }

    buildJointGrid('r1-joints');
    buildJointGrid('r2-joints');

    function updateJoints(prefix, joints) {
      for (let i = 0; i < 6; i++) {
        const v = joints[i] ?? 0;
        const pct = ((v + Math.PI) / (2 * Math.PI)) * 100;
        const bar = document.getElementById(`${prefix}-bar-${i}`);
        const val = document.getElementById(`${prefix}-val-${i}`);
        if (bar) bar.style.width = pct.toFixed(1) + '%';
        if (val) val.textContent = v.toFixed(3);
      }
    }

    // ── Log helper ──
    const MAX_LOG = 60;
    let logEntries = [];

    function addLog(msg, cls = 'info') {
      const ts = new Date().toLocaleTimeString();
      logEntries.push({ ts, msg, cls });
      if (logEntries.length > MAX_LOG) logEntries.shift();
      const box = document.getElementById('log-box');
      box.innerHTML = logEntries.map(e =>
        `<div class="entry ${e.cls}">[${e.ts}] ${e.msg}</div>`).join('');
      box.scrollTop = box.scrollHeight;
    }

    // ── HTTP API ──
    async function calibrateRobot(robotId, btn) {
      btn.disabled = true;
      btn.textContent = "Wait...";
      addLog(`[${robotId}] Requesting auto-calibration...`, 'warn');
      
      try {
        const res = await fetch(`/api/calibrate/${robotId}`, { method: 'POST' });
        if (res.ok) {
          addLog(`[${robotId}] Auto-calibration sequence started!`, 'ok');
        } else {
          throw new Error("Server rejected command");
        }
      } catch (err) {
        addLog(`[${robotId}] Failed to start calibration: ${err.message}`, 'err');
      } finally {
        setTimeout(() => {
          btn.textContent = "Calibrate";
          btn.disabled = false;
        }, 3000);
      }
    }

    const learningToggle = document.getElementById('learning-toggle');
    const learningLabel = document.getElementById('learning-label');
    
    learningToggle.addEventListener('change', async (e) => {
      const isLearning = e.target.checked;
      learningToggle.disabled = true; // prevent spam
      learningLabel.textContent = isLearning ? "Motors Unlocked (Learning)" : "Motors Locked";
      
      try {
        const res = await fetch(`/api/learning/${isLearning}`, { method: 'POST' });
        if (res.ok) {
          addLog(`Global learning mode set to: ${isLearning ? 'ON' : 'OFF'}`, isLearning ? 'warn' : 'ok');
        } else {
          throw new Error("Server rejected command");
        }
      } catch (err) {
        addLog(`Failed to toggle learning mode: ${err.message}`, 'err');
        // revert toggle on failure
        e.target.checked = !isLearning;
        learningLabel.textContent = !isLearning ? "Motors Unlocked (Learning)" : "Motors Locked";
      } finally {
        learningToggle.disabled = false;
      }
    });

    // ── SSE connection ──
    const pill = document.getElementById('pill');
    const pillLabel = document.getElementById('pill-label');
    let prevR1 = null, prevR2 = null, prevUnity = null;

    function connect() {
      const es = new EventSource('/status/sse');

      es.onopen = () => {
        pill.classList.add('live');
        pillLabel.textContent = 'Live';
        addLog('SSE stream connected to hub.', 'ok');
      };

      es.onmessage = (e) => {
        const d = JSON.parse(e.data);

        // Map PascalCase (C# default JSON) / camelCase
        const r1Conn = d.R1Connected ?? d.r1Connected;
        const r2Conn = d.R2Connected ?? d.r2Connected;
        const unityConn = d.UnityConnected ?? d.unityConnected;
        const r1Stat = d.R1Status ?? d.r1Status ?? '--';
        const r2Stat = d.R2Status ?? d.r2Status ?? '--';
        const r1T = d.R1RpiTemp ?? d.r1RpiTemp ?? '--';
        const r2T = d.R2RpiTemp ?? d.r2RpiTemp ?? '--';
        const r1J = d.R1Joints ?? d.r1Joints ?? [];
        const r2J = d.R2Joints ?? d.r2Joints ?? [];
        const lat = d.UnityLatencyMs ?? d.unityLatencyMs ?? '--';
        const fps = d.CameraFps ?? d.cameraFps ?? '--';

        // Robots
        const r1Dot = document.getElementById('r1-dot');
        const r2Dot = document.getElementById('r2-dot');
        r1Dot.classList.toggle('on', r1Conn);
        r2Dot.classList.toggle('on', r2Conn);
        document.getElementById('r1-status').textContent = r1Stat;
        document.getElementById('r2-status').textContent = r2Stat;
        document.getElementById('r1-temp').textContent = r1T + ' C';
        document.getElementById('r2-temp').textContent = r2T + ' C';

        updateJoints('r1-joints', r1J);
        updateJoints('r2-joints', r2J);

        // Unity
        const unityDot = document.getElementById('unity-dot');
        unityDot.classList.toggle('on', unityConn);
        document.getElementById('unity-status').textContent = unityConn ? 'ONLINE' : 'OFFLINE';
        document.getElementById('latency-val').textContent = lat;
        document.getElementById('fps-val').textContent = fps;

        document.getElementById('ts').textContent = new Date().toLocaleTimeString();

        // Log connection changes
        if (prevR1 !== null && r1Conn !== prevR1)
          addLog(`R1 ROS bridge: ${r1Conn ? 'CONNECTED' : 'DISCONNECTED'}`, r1Conn ? 'ok' : 'err');
        if (prevR2 !== null && r2Conn !== prevR2)
          addLog(`R2 ROS bridge: ${r2Conn ? 'CONNECTED' : 'DISCONNECTED'}`, r2Conn ? 'ok' : 'err');
        if (prevUnity !== null && unityConn !== prevUnity)
          addLog(`Unity expert: ${unityConn ? 'CONNECTED' : 'DISCONNECTED'}`, unityConn ? 'ok' : 'warn');

        prevR1 = r1Conn;
        prevR2 = r2Conn;
        prevUnity = unityConn;
      };

      es.onerror = () => {
        pill.classList.remove('live');
        pillLabel.textContent = 'Reconnecting ...';
        addLog('SSE connection lost. Retrying ...', 'err');
        es.close();
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>

</html>
